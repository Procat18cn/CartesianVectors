<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>笛卡尔坐标系向量 3D 演示</title>
  </head>
  <body>
    <div id="app">
      <aside class="panel" aria-label="向量控制面板">
        <div class="panel-content">
        <header class="panel__header">
          <div>
            <p class="eyebrow">CartesianVectors</p>
            <h1>笛卡尔坐标系向量 3D 演示</h1>
          </div>
        </header>

        <section class="panel-section">
          <div class="section-heading section-heading--compact">
            <h2>视角</h2>
            <button id="viewHelp" class="icon-button" type="button" aria-expanded="false" aria-controls="viewHelpPopover">?</button>
          </div>
          <div id="viewHelpPopover" class="popover is-hidden" role="dialog" aria-label="视角操作提示">
            <strong>视角操作</strong>
            <span>拖拽：旋转视角</span>
            <span>滚轮：缩放</span>
            <span>右键拖拽：平移</span>
            <span>按钮：切换预设视角</span>
          </div>
          <div class="button-grid button-grid--views">
            <button data-view="iso" type="button">等轴测</button>
            <button data-view="xy" type="button">XY 平面</button>
            <button data-view="xz" type="button">XZ 平面</button>
            <button data-view="yz" type="button">YZ 平面</button>
          </div>
          <div class="button-grid">
            <button id="zoomIn" type="button">放大</button>
            <button id="zoomOut" type="button">缩小</button>
            <button id="resetView" type="button">重置视角</button>
          </div>
        </section>

        <section class="panel-section">
          <h2>场景</h2>
          <label class="field field--inline">
            <span>背景颜色</span>
            <input id="backgroundColor" type="color" value="#f7fafc" />
          </label>
          <div class="inline-toggle-row">
            <label class="toggle">
              <input id="showGrid" type="checkbox" checked />
              <span>显示网格</span>
            </label>
            <label class="toggle">
              <input id="showAxes" type="checkbox" checked />
              <span>显示坐标轴</span>
            </label>
          </div>
        </section>

        <section class="panel-section">
          <div class="section-heading">
            <h2>向量列表</h2>
            <button id="addVector" class="primary-button" type="button">添加向量</button>
          </div>
          <div id="vectorList" class="vector-list"></div>
        </section>

        <section class="panel-section">
          <h2>向量设置</h2>
          <div class="field-grid">
            <label class="field">
              <span>名称</span>
              <input id="vectorName" type="text" />
            </label>
            <label class="field">
              <span>颜色</span>
              <input id="vectorColor" type="color" />
            </label>
          </div>

          <div class="mode-tabs" aria-label="向量参数模式">
            <button id="componentMode" class="mode-tab mode-tab--active" type="button">分量模式</button>
            <button id="directionMode" class="mode-tab" type="button">方向模式</button>
          </div>

          <div id="componentFields" class="field-stack">
            <label class="field">
              <span>x</span>
              <input id="vectorX" type="number" step="0.1" />
            </label>
            <label class="field">
              <span>y</span>
              <input id="vectorY" type="number" step="0.1" />
            </label>
            <label class="field">
              <span>z</span>
              <input id="vectorZ" type="number" step="0.1" />
            </label>
          </div>

          <div id="directionFields" class="field-stack is-hidden">
            <label class="field">
              <span>|v|</span>
              <input id="vectorMagnitude" type="number" min="0" step="0.1" />
            </label>
            <label class="field">
              <span>Yaw</span>
              <input id="vectorYaw" type="number" step="1" />
            </label>
            <label class="field">
              <span>Pitch</span>
              <input id="vectorPitch" type="number" min="-90" max="90" step="1" />
            </label>
          </div>
          <p id="directionTip" class="tip is-hidden">
            Yaw 控制向量在 XY 平面的朝向，Pitch 控制相对 XY 平面的仰角。单个向量的 Roll 不改变方向，通常用于刚体姿态。
          </p>

          <div class="field-stack">
            <label class="field">
              <span>粗细</span>
              <input id="vectorThickness" type="range" min="0.02" max="0.15" step="0.005" />
            </label>
          </div>

          <h3 class="subheading">显示元素</h3>
          <div class="toggle-grid">
            <label class="toggle">
              <input id="vectorVisible" type="checkbox" />
              <span>向量</span>
            </label>
            <label class="toggle">
              <input id="showNameLabel" type="checkbox" />
              <span>名称</span>
            </label>
            <label class="toggle">
              <input id="showAngles" type="checkbox" />
              <span>角度</span>
            </label>
            <label class="toggle">
              <input id="showMagnitudeLabel" type="checkbox" />
              <span>向量模长</span>
            </label>
            <label class="toggle">
              <input id="showComponents" type="checkbox" />
              <span>分量</span>
            </label>
            <label class="toggle">
              <input id="showComponentLabels" type="checkbox" />
              <span>分量长度</span>
            </label>
            <label class="toggle">
              <input id="showProjectionBox" type="checkbox" />
              <span>辅助线</span>
            </label>
          </div>
        </section>

        <section class="panel-section">
          <h2>数值信息</h2>
          <dl id="vectorDetails" class="details"></dl>
        </section>
        <footer class="panel-footer">
          <a class="github-link" href="https://github.com/Procat18cn/CartesianVectors" target="_blank" rel="noreferrer">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                fill="currentColor"
                d="M12 2C6.48 2 2 6.59 2 12.25c0 4.53 2.87 8.37 6.84 9.72.5.1.68-.22.68-.49v-1.9c-2.78.62-3.37-1.21-3.37-1.21-.45-1.19-1.11-1.5-1.11-1.5-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.9 1.57 2.35 1.12 2.92.86.09-.66.35-1.12.63-1.38-2.22-.26-4.56-1.14-4.56-5.08 0-1.12.39-2.04 1.03-2.76-.1-.26-.45-1.31.1-2.72 0 0 .84-.28 2.75 1.05A9.3 9.3 0 0 1 12 6.93c.85 0 1.7.12 2.5.34 1.9-1.33 2.74-1.05 2.74-1.05.55 1.41.2 2.46.1 2.72.64.72 1.03 1.64 1.03 2.76 0 3.95-2.34 4.82-4.57 5.08.36.32.68.94.68 1.9v2.8c0 .27.18.59.69.49A10.14 10.14 0 0 0 22 12.25C22 6.59 17.52 2 12 2Z"
              />
            </svg>
            <span>GitHub</span>
          </a>
        </footer>
        </div>
      </aside>
      <button id="panelToggle" class="panel-toggle" type="button" aria-expanded="true" aria-label="收缩控制栏">
        <span class="panel-toggle__icon">‹</span>
      </button>
      <main id="viewport" aria-label="3D 向量演示画布"></main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
